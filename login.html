<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Myntra Address Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f6;
      margin: 0;
      padding: 0;
    }

    .header {
      background-color: #ff3f6c;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      width: 400px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #ff3f6c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #e6335a;
    }

    .success {
      display: none;
      margin-top: 15px;
      color: green;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">Myntra - Delivery Address</div>

  <div class="container">
    <h2>Enter Address Details</h2>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <textarea id="address" placeholder="Full Address" required></textarea>

    <button onclick="saveAddress()">Save Address</button>

    <div class="success" id="successMsg">
      ✅ Address Saved Successfully!
    </div>
  </div>

  <script>
    function saveAddress() {
      let name = document.getElementById("name").value;
      let mobile = document.getElementById("mobile").value;
      let address = document.getElementById("address").value;

      if(name === "" || mobile === "" || address === "") {
        alert("Please fill all fields!");
      } else {
        document.getElementById("successMsg").style.display = "block";
      }
    }
  </script>

</body>
</html>
